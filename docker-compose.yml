version: '3'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs/fullchain.pem:/etc/ssl/certs/cert.pem
      - ./certs/privkey.pem:/etc/ssl/private/key.pem
    depends_on:
      - api
    restart: always
    environment:
      TZ: Asia/Seoul
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    expose:
      - "8000"
    depends_on:
      - redis
    env_file:
      - .env
    restart: always
    environment:
      TZ: Asia/Seoul
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: always
    environment:
      TZ: Asia/Seoul

volumes:
  redis-data: 