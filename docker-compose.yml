version: '3'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env
    restart: always
    environment:
      TZ: Asia/Seoul

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: always
    environment:
      TZ: Asia/Seoul

volumes:
  redis-data: 