<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호서교통 관리자</title>
    <!-- 구글 폰트 추가 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #6c757d;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #f8f9fa;
            --dark: #343a40;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
            --radius: 8px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; 
            background: #f5f7fa; 
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
            word-break: keep-all;
        }

        .login-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .login-header { 
            background: var(--dark);
            color: var(--white);
            padding: 1.2rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
        }

        .login-header .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .login-header .logo::before {
            content: '🚌';
            margin-right: 0.8rem;
            font-size: 1.6rem;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            background-color: var(--dark);
            position: relative;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.3) 0%, rgba(58, 86, 212, 0.3) 100%);
            z-index: 1;
        }

        .login-box { 
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px; 
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 2.5rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title { 
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            padding-bottom: 1rem;
        }

        .login-title h2 {
            font-size: 1.8rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .login-title p {
            color: var(--secondary);
            margin: 0;
            font-size: 0.95rem;
        }

        .login-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--primary);
            border-radius: 100px;
        }

        .login-form {
            margin-top: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label { 
            display: block; 
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }

        .form-control { 
            width: 100%; 
            padding: 0.85rem 1rem;
            background: var(--light);
            border: 1px solid #e9ecef;
            border-radius: var(--radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .input-group {
            position: relative;
        }

        .input-group .form-control {
            padding-left: 3rem;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 1rem;
            transform: translateY(-50%);
            color: var(--secondary);
        }

        .btn { 
            width: 100%; 
            padding: 0.85rem 1rem;
            background: var(--primary); 
            color: var(--white); 
            border: none; 
            border-radius: var(--radius); 
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn::before {
            content: '🔑';
            margin-right: 0.5rem;
        }

        .btn:hover { 
            background: var(--primary-dark); 
        }

        .error-alert { 
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(231, 76, 60, 0.1);
            border-left: 4px solid var(--danger);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            animation: shake 0.5s ease;
        }

        .is-hidden {
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-alert::before {
            content: '⚠️';
            font-size: 1.2rem;
            margin-right: 0.8rem;
        }

        .error-alert p {
            margin: 0;
            color: var(--danger);
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary);
        }

        @media (max-width: 576px) {
            .login-box {
                padding: 1.5rem;
                max-width: 340px;
            }
            
            .login-title h2 {
                font-size: 1.5rem;
            }
            
            .login-header {
                padding: 1rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <header class="login-header">
            <h1 class="logo">
                호서교통 관리자
            </h1>
        </header>
        
        <main class="login-container">
            <div class="login-box">
                <div class="login-title">
                    <h2>관리자 로그인</h2>
                    <p>관리자 계정으로 로그인하세요</p>
                </div>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label class="form-label" for="email">이메일</label>
                        <div class="input-group">
                            <span class="input-icon">✉️</span>
                            <input type="text" id="email" name="email" class="form-control" placeholder="관리자 이메일 입력" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">비밀번호</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
                        </div>
                    </div>
                    
                    <!-- 리다이렉트 URL을 위한 숨겨진 필드 추가 -->
                    <input type="hidden" id="redirect" name="redirect" value="{{ redirect }}">
                    
                    <button type="submit" class="btn">
                        로그인
                    </button>
                </form>
                
                <div id="errorMessage" class="error-alert is-hidden">
                    <p>{{ error }}</p>
                </div>
                
                <div class="login-footer">
                    © 호서교통 관리자 시스템
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 에러 메시지가 있는 경우 표시
            const error = "{{ error }}";
            const errorElement = document.getElementById('errorMessage');
            
            if (error && error.trim() !== 'None' && error.trim() !== '') {
                errorElement.classList.remove('is-hidden');
            }
            
            // URL 매개변수에서 리다이렉트 경로 가져오기
            const urlParams = new URLSearchParams(window.location.search);
            const redirectParam = urlParams.get('redirect');
            
            // 리다이렉트 필드에 값 설정
            if (redirectParam && redirectParam !== "None" && redirectParam.trim() !== "") {
                document.getElementById('redirect').value = redirectParam;
            } else {
                document.getElementById('redirect').value = "/admin";
            }
            
            // 로그인 폼 제출 처리
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', function(e) {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const redirect = document.getElementById('redirect').value;
                
                if (!email || !password) {
                    e.preventDefault();
                    showError('이메일과 비밀번호를 모두 입력해주세요');
                    return;
                }
                loginForm.action = '/admin/login';
            });
            
            // 에러 메시지 표시 함수
            function showError(message) {
                errorElement.querySelector('p').textContent = message;
                errorElement.classList.remove('is-hidden');
            }
        });
    </script>
</body>
</html>
